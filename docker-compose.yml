name: wall-cast

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./config:/config
    env_file:
      - path: .env
        required: false
    environment:
      WALL_CONFIG_PATH: /config/wall-cast.yaml
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # Auto-caster: casts the display to a Chromecast on startup and keeps it alive.
  # Uses `catt` (Cast All The Things) which loads the URL via the DashCast receiver.
  #
  # Setup (one-time):
  #   1. Find your Chromecast's IP: docker run --rm --network=host python:3.12-slim \
  #        sh -c 'pip install -q catt && catt scan'
  #   2. Set CHROMECAST_IP to the Chromecast/Google TV IP address
  #   3. Set DISPLAY_URL to the LAN IP of this machine (e.g. http://192.168.1.x/)
  #      ⚠ Do NOT use http://localhost/ — the TV resolves localhost as itself, not this host
  #   4. Set DHCP reservations for both IPs in your router so they never change
  #
  # network_mode: host is required to reach the Chromecast via mDNS on the LAN.
  #
  caster:
    build:
      context: ./caster
    network_mode: host
    restart: unless-stopped
    environment:
      CHROMECAST_IP: "192.168.101.246"  # Office TV
      DISPLAY_URL: "http://192.168.101.252/"  # URL to cast — must be reachable from the TV
      CHECK_INTERVAL: "60"              # seconds between liveness checks
    depends_on:
      frontend:
        condition: service_started
