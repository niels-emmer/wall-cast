  #       enabled: true
  #       condition:
  #         variable: polestar.range_km
  #         operator: "<="
  #         value: 50
  #         unit: km
  #     - id: polestar-not-plugged
  #       title: Polestar not plugged in at night
  #       enabled: true
  #       condition:
  #         variable: polestar.is_plugged_in
  #         operator: "=="
  #         value: false
  #     - id: air-quality-poor
  #       title: Poor air quality
  #       enabled: true
  #       condition:
  #         variable: airquality.aqi
  #         operator: ">="
  #         value: 60
  #     - id: birch-pollen-high
  #       title: High birch pollen
  #       enabled: true
  #       condition:
  #         variable: airquality.pollen_birch
  #         operator: in
  #         value: [high, very_high]
  #     - id: grass-pollen-high
  #       title: High grass pollen
  #       enabled: true
  #       condition:
  #         variable: airquality.pollen_grass
  #         operator: in
