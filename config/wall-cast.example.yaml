  #       title: Crypto market extreme fear
  #       enabled: true
  #       condition:
  #         variable: market.fear_greed
  #         operator: "<="
  #         value: 20             # 0–100; <=20 = extreme fear, >=80 = extreme greed
  #     - id: wan-down
  #       title: Internet connection down
  #       enabled: true
  #       condition:
  #         variable: network.wan_down
  #         operator: "=="
  #         value: true

  widgets:
    - id: news
      type: news
      col: 1
      row: 8
      col_span: 12
      row_span: 1
      config:
        feeds:
          - url: https://www.dutchnews.nl/rss
            label: DutchNews
          - url: https://news.ycombinator.com/rss
            label: HackerNews
          - url: http://reddit.com/r/worldnews.rss
            label: /r/worldnews
        scroll_speed_px_per_sec: 80
        ntfy_url: https://ntfy.example.com
        ntfy_topic: wall-cast

# ── Screens: one entry per physical display ───────────────────────────────────
screens:
  - id: office
    name: Office
    chromecast_ip: ""      # e.g. "192.168.1.42" — find with: catt scan
    chromecast_name: ""    # e.g. "Living Room TV" — device's friendly name (Settings → Device name on the TV)
                           # When set, the caster re-discovers the device via LAN scan if the IP changes after a reboot.
    # chromecast_mac: ""   # e.g. "aa:bb:cc:dd:ee:ff" — enables Wake-on-LAN fallback when the device is in deep sleep.
                           # Find it in TV Settings → Network → MAC address.
                           # Optional: only needed if KEYCODE_WAKEUP via Android TV Remote is insufficient.
    #
    # Remote control (wake/sleep display without ADB)
    # ------------------------------------------------
    # Pair once per device, then use the Wake / Sleep buttons in the admin panel.
    #
    #   docker compose exec caster python /pair.py --screen-id office --ip <chromecast_ip>
    #
    # A PIN appears on the TV screen; enter it in the terminal to complete pairing.
    # Certificates are stored in config/atv-certs/office/ and reused automatically.
    people: []             # person IDs from shared.people to show on this screen
    layout:
      columns: 12
      rows: 8
    widgets:
      - id: clock
        type: clock
        col: 1
        row: 1
        col_span: 4
        row_span: 2
        config:
          show_seconds: true
          show_date: true

      - id: main-rotator
        type: rotate
        col: 5
        row: 1
        col_span: 8
        row_span: 7
        config:
          interval_sec: 15
          widgets:
            - type: weather
              config:
                show_hourly: true
                show_daily: true
            - type: calendar
              config: {}
            - type: traffic
              config: {}    # home/work/roads come from the person assigned to this screen
            - type: warnings
              config: {}
            - type: airquality
              config: {}

      - id: bottom-left-rotator
        type: rotate
        col: 1
        row: 3
        col_span: 4
        row_span: 5
        config:
          interval_sec: 15
          widgets:
            - type: rain
              config: {}
            - type: garbage
              config:
                days_ahead: 31  # postcode/huisnummer come from shared.garbage
            - type: polestar
              config: {}
            - type: bus
              config: {}        # stop city/name come from the person assigned to this screen
            - type: network
              config: {}
