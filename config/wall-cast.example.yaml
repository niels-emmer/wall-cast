  #       enabled: true
  #       condition:
  #         variable: airquality.pollen_alder
  #         operator: in
  #         value: [high, very_high]
  #     - id: mugwort-pollen-high
  #       title: High mugwort pollen
  #       enabled: true
  #       condition:
  #         variable: airquality.pollen_mugwort
  #         operator: in
  #         value: [high, very_high]
  #     - id: pm25-high
  #       title: High PM2.5 particles
  #       enabled: true
  #       condition:
  #         variable: airquality.pm2_5
