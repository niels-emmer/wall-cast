# wall-cast configuration — multi-screen format
#
# shared:   applies to every screen (news ticker, location, language, garbage)
# screens:  one entry per physical display
#
# After editing, the display hot-reloads within ~1 second.
# Admin panel: http://<host>/#admin

# ── Shared: applies to every screen ──────────────────────────────────────────
shared:
  location:
    lat: 52
    lon: 5
    name: My City
  language: en

  # Rotator fade speed in seconds (default: 0.8 = "Normal")
  # Controls how long the cross-fade animation takes when the rotator switches slots.
  # Preset values: 2.0 (Slow) | 1.4 (Relaxed) | 0.8 (Normal) | 0.4 (Snappy) | 0.15 (Fast)
  fade_speed: 0.8

  # Garbage collection address (mijnafvalwijzer.nl — Netherlands only)
  garbage:
    postcode: "1234AB"
    huisnummer: "1"

  # Network widget — router integration (optional, Zyxel VMG8825 DAL API)
  # Without this block the widget still shows connectivity, DNS, and speedtest.
  # router_url and router_username can also be set via Admin → General → Network widget.
  # ⚠ router_password is NOT stored here — set ROUTER_PASSWORD in your .env file.
  # network:
  #   router_url:              https://192.168.1.1
  #   router_username:         admin
  #   speedtest_bytes_down:    2000000   # bytes per test (default 2 MB)
  #   speedtest_bytes_up:      200000    # bytes per test (default 200 KB)

  people: []
    # Example:
    # - id: alice
    #   name: Alice
    #   family: true        # shows on all screens (e.g. shared family calendar)
    #   calendar_ids:
    #     - family@group.calendar.google.com
    # - id: bob
    #   name: Bob
    #   calendar_ids:
    #     - bob@gmail.com
    #   traffic:            # commute — used on any screen Bob is assigned to
    #     home_address: "Home Street 1, 1234AB City, NL"
    #     work_address: "Work Street 1, 5678CD City, NL"
    #     route_roads: "A10,A2"   # comma-separated — jams on these float to the top
    #   rss_feeds:          # personal feeds — appended to global feeds on screens Bob is assigned to
    #     - url: https://feeds.example.com/bob
    #       label: Bob's Blog   # optional; defaults to the person's name
    #   bus:                # bus stop — used on any screen Bob is assigned to
    #     stop_city: Amsterdam
    #     stop_name: Leidseplein
    #   notify:             # assistant notification routing (optional)
    #     ntfy_topic: wall-cast-bob   # personal ntfy topic (overrides shared default)
    #     # matrix_id: "@bob:matrix.example.com"   # future: Matrix DM
    #   rules:              # personal assistant rules (in addition to shared rules)
    #     - id: bob-bus-threshold
    #       title: Bob's bus alert
    #       enabled: true
    #       condition:
    #         variable: bus.delay_minutes
    #         operator: ">="
    #         value: 3
    #         unit: min

  # ── Assistant: proactive notifications ──────────────────────────────────────
  # Standalone sidecar that polls backend data and pushes smart notifications.
  # All settings here are optional — remove this block to disable the assistant.
  #
  # assistant:
  #   enabled: true
  #   check_interval: 300       # seconds between check cycles (default 300 = 5 min)
  #   backend_url: http://backend:8000   # internal Docker service name
  #
  #   notify:
  #     ntfy_url: https://ntfy.example.com
  #     ntfy_topic: wall-cast-alerts    # global topic; overridable per person
  #
  #   ai:
  #     provider: none            # none | ollama | openai
  #     # ollama_url: http://host.docker.internal:11434
  #     # ollama_model: llama3.2:3b
  #     # openai_model: gpt-4o-mini
  #     # openai_api_key: sk-...  # better: set OPENAI_API_KEY in .env
  #
  #   rules:
  #     - id: garbage-reminder
  #       title: Garbage pickup reminder
  #       enabled: true
  #       condition:
  #         variable: garbage.hours_until_pickup
  #         operator: "<="
  #         value: 18
  #         unit: h
  #     - id: bus-delay
  #       title: Bus delay alert
  #       enabled: true
  #       condition:
  #         variable: bus.delay_minutes
  #         operator: ">="
  #         value: 5
  #         unit: min
  #     - id: traffic-delay
  #       title: Traffic delay
  #       enabled: true
  #       condition:
  #         variable: traffic.delay_pct
  #         operator: ">="
  #         value: 25
  #         unit: "%"
  #     - id: calendar-reminder
  #       title: Calendar reminder
  #       enabled: true
  #       condition:
  #         variable: calendar.minutes_until_event
  #         operator: "<="
  #         value: 30
  #         unit: min
  #     - id: weather-warning
  #       title: Weather warning
  #       enabled: true
  #       condition:
  #         variable: weather.warning_level
  #         operator: in
  #         value: [oranje, rood]

  widgets:
    - id: news
      type: news
      col: 1
      row: 8
      col_span: 12
      row_span: 1
      config:
        feeds:
          - url: https://www.dutchnews.nl/rss
            label: DutchNews
          - url: https://news.ycombinator.com/rss
            label: HackerNews
          - url: http://reddit.com/r/worldnews.rss
            label: /r/worldnews
        scroll_speed_px_per_sec: 80
        ntfy_url: https://ntfy.example.com
        ntfy_topic: wall-cast

# ── Screens: one entry per physical display ───────────────────────────────────
screens:
  - id: office
    name: Office
    chromecast_ip: ""      # e.g. "192.168.1.42" — find with: catt scan
    chromecast_name: ""    # e.g. "Living Room TV" — device's friendly name (Settings → Device name on the TV)
                           # When set, the caster re-discovers the device via LAN scan if the IP changes after a reboot.
    people: []             # person IDs from shared.people to show on this screen
    layout:
      columns: 12
      rows: 8
    widgets:
      - id: clock
        type: clock
        col: 1
        row: 1
        col_span: 4
        row_span: 3
        config:
          show_seconds: true
          show_date: true

      - id: main-rotator
        type: rotate
        col: 5
        row: 1
        col_span: 8
        row_span: 7
        config:
          interval_sec: 15
          widgets:
            - type: weather
              config:
                show_hourly: true
                show_daily: true
            - type: calendar
              config: {}
            - type: traffic
              config: {}    # home/work/roads come from the person assigned to this screen
            - type: warnings
              config: {}
            - type: airquality
              config: {}

      - id: bottom-left-rotator
        type: rotate
        col: 1
        row: 4
        col_span: 4
        row_span: 4
        config:
          interval_sec: 15
          widgets:
            - type: rain
              config: {}
            - type: garbage
              config:
                days_ahead: 31  # postcode/huisnummer come from shared.garbage
            - type: polestar
              config: {}
            - type: bus
              config: {}        # stop city/name come from the person assigned to this screen
            - type: network
              config: {}
