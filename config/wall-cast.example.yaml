  #       enabled: true
  #       condition:
  #         variable: traffic.delay_pct
  #         operator: ">="
  #         value: 25
  #         unit: "%"
  #     - id: calendar-reminder
  #       title: Calendar reminder
  #       enabled: true
  #       condition:
  #         variable: calendar.minutes_until_event
  #         operator: "<="
  #         value: 30
  #         unit: min
  #     - id: weather-warning
  #       title: Weather warning
  #       enabled: true
  #       condition:
  #         variable: weather.warning_level
  #         operator: in
  #         value: [oranje, rood]
  #     - id: temperature-alert
  #       title: Freezing temperatures
  #       enabled: true
  #       condition:
  #         variable: weather.temperature
  #         operator: "<="
  #         value: 0
