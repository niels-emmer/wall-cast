# wall-cast configuration
# Edit this file and save — the display updates automatically within ~1 second.

location:
  lat: 52.5257
  lon: 6.4510
  name: Smilde

layout:
  columns: 12   # CSS grid columns
  rows: 8       # CSS grid rows

widgets:
  - id: clock
    type: clock
    col: 1
    row: 1
    col_span: 4
    row_span: 3
    config:
      show_seconds: true
      show_date: true

  - id: weather
    type: weather
    col: 5
    row: 1
    col_span: 8
    row_span: 7
    config:
      show_hourly: true
      show_daily: true

  - id: rain
    type: rain
    col: 1
    row: 4
    col_span: 4
    row_span: 4
    config: {}

  - id: news
    type: news
    col: 1
    row: 8
    col_span: 12
    row_span: 1
    config:
      feeds:
        - url: https://feeds.nos.nl/nosnieuwsalgemeen
          label: NOS
        - url: https://www.nu.nl/rss/Algemeen
          label: NU.nl
      scroll_speed_px_per_sec: 80
      ntfy_url: https://ntfy.macjuu.com
      ntfy_topic: wall-cast
